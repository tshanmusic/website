<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T. Shan | &lsquo;BDSM&rsquo; Embroidered Beanie</title>
  <meta name="description" content="Embroidered beanie. One size fits most.">
  <link rel="icon" href="../../images/favicon.ico">
  <link rel="stylesheet" href="../../css/style.css">
  <script type="text/javascript" src="https://payhip.com/payhip.js"></script>
  <style>
    .product-detail {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: start;
      max-width: 960px;
      margin: 0 auto;
    }

    .product-gallery-main img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .product-gallery-thumbs {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .product-gallery-thumbs img {
      width: calc(33.333% - 7px);
      aspect-ratio: 1;
      object-fit: cover;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .product-gallery-thumbs img:hover,
    .product-gallery-thumbs img.active {
      opacity: 1;
    }

    .product-info {
      padding-top: 8px;
    }

    .product-breadcrumb {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 24px;
    }

    .product-breadcrumb a {
      color: var(--gray);
      text-decoration: underline;
    }

    .product-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .product-price {
      font-size: 13px;
      letter-spacing: 0.1em;
      color: var(--gray);
      margin-bottom: 28px;
    }

    .product-description {
      font-size: 12px;
      line-height: 1.8;
      letter-spacing: 0.08em;
      color: #444;
      margin-bottom: 36px;
    }

    .product-description p + p {
      margin-top: 12px;
    }

    a.payhip-buy-button {
      display: inline-block;
      background: var(--black);
      color: var(--white);
      font-family: var(--font);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 14px 36px;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    a.payhip-buy-button:hover {
      opacity: 0.75;
    }

    @media (max-width: 700px) {
      .product-detail {
        grid-template-columns: 1fr;
        gap: 36px;
      }
    }
  </style>
</head>
<body>

  <div class="announcement-bar">
    <a href="https://tshan.vibe.to/flowers-spice" target="_blank" rel="noopener">Listen to Flowers &amp; Spice EP &rarr;</a>
  </div>

  <nav class="site-nav light" id="site-nav">
    <div class="nav-logo">
      <a href="../../"><img src="../../images/chinese-seal-logo.png" alt="T. Shan"></a>
    </div>
    <ul class="nav-links">
      <li><a href="../../">Home</a></li>
      <li><a href="../../press/">Press</a></li>
    </ul>
    <button class="nav-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-nav">
    <a href="../../">Home</a>
    <a href="../../press/">Press</a>
  </div>

  <div class="page-header">
    <div class="inner">
      <h1 class="section-title">Merch</h1>
    </div>
  </div>

  <div class="press-section">
    <div class="inner">
      <div class="product-detail">

        <div class="product-gallery">
          <div class="product-gallery-main">
            <img id="main-img" src="../../images/bdsm-beanie-1.jpg" alt="'BDSM' embroidered beanie">
          </div>
          <div class="product-gallery-thumbs">
            <img src="../../images/bdsm-beanie-1.jpg" alt="" class="active" onclick="setMain(this)">
            <img src="../../images/bdsm-beanie-2.jpg" alt="" onclick="setMain(this)">
            <img src="../../images/bdsm-beanie-3.jpg" alt="" onclick="setMain(this)">
          </div>
        </div>

        <div class="product-info">
          <p class="product-breadcrumb"><a href="../">Merch</a> &rsaquo; &lsquo;BDSM&rsquo; Beanie</p>
          <h2 class="product-title">&lsquo;BDSM&rsquo; Embroidered Beanie</h2>
          <p class="product-price">$20.00</p>
          <div class="product-description">
            <p>Embroidered front graphic. One size fits most.</p>
          </div>
          <a href="https://payhip.com/b/8Jv2j" class="payhip-buy-button" data-theme="none" data-product="8Jv2j">Buy Now</a>
        </div>

      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-logo">
      <img src="../../images/chinese-seal-logo.png" alt="T. Shan">
    </div>
    <nav>
      <ul class="footer-nav">
        <li><a href="../../">Home</a></li>
        <li><a href="../../#about">About</a></li>
        <li><a href="../../#music">Music</a></li>
        <li><a href="../../press/">Press</a></li>
      </ul>
    </nav>
    <p class="footer-booking">Booking &amp; press: <a href="mailto:contact@tshanmusic.com">contact@tshanmusic.com</a></p>
    <p class="footer-copyright">&copy; <span id="year"></span> T. Shan. All rights reserved.</p>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script>
    function setMain(thumb) {
      document.getElementById('main-img').src = thumb.src;
      document.querySelectorAll('.product-gallery-thumbs img').forEach(t => t.classList.remove('active'));
      thumb.classList.add('active');
    }
  </script>
  <script src="../../js/main.js"></script>
</body>
</html>
