<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T. Shan | Merch</title>
  <meta name="description" content="Official T. Shan merchandise.">
  <link rel="icon" href="../images/favicon.ico">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .site-nav {
      justify-content: center;
    }

    .nav-links,
    .nav-toggle {
      display: none !important;
    }

    .shop-embed {
      width: 100%;
      height: 2000px;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <nav class="site-nav light" id="site-nav">
    <div class="nav-logo">
      <a href="../"><img src="../images/chinese-seal-logo.png" alt="T. Shan"></a>
    </div>
  </nav>

  <iframe
    src="https://payhip.com/tshanmusic"
    class="shop-embed"
    title="T. Shan Merch Store"
    scrolling="no"
    loading="lazy"
  ></iframe>

  <footer class="site-footer">
    <div class="footer-logo">
      <img src="../images/chinese-seal-logo.png" alt="T. Shan">
    </div>
    <nav>
      <ul class="footer-nav">
        <li><a href="../">Home</a></li>
        <li><a href="../#about">About</a></li>
        <li><a href="../#music">Music</a></li>
        <li><a href="../press/">Press</a></li>
      </ul>
    </nav>
    <p class="footer-booking">Booking &amp; press: <a href="mailto:contact@tshanmusic.com">contact@tshanmusic.com</a></p>
    <p class="footer-copyright">&copy; <span id="year"></span> T. Shan. All rights reserved.</p>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script src="../js/main.js"></script>
</body>
</html>
