<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T. Shan | Merch</title>
  <meta name="description" content="Official T. Shan merchandise.">
  <link rel="icon" href="../images/favicon.ico">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 48px 36px;
    }

    .product-card {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
    }

    .product-card-images {
      position: relative;
      overflow: hidden;
      background: var(--light-gray);
    }

    .product-card-images img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      transition: opacity 0.3s;
    }

    .product-card-images img.alt {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0;
    }

    .product-card:hover .product-card-images img.primary { opacity: 0; }
    .product-card:hover .product-card-images img.alt { opacity: 1; }

    .product-card-info {
      padding: 16px 0 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .product-card-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .product-card-price {
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--gray);
    }

    @media (max-width: 600px) {
      .shop-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 28px 16px;
      }
    }
  </style>
</head>
<body>

  <div class="announcement-bar">
    <a href="https://tshan.vibe.to/flowers-spice" target="_blank" rel="noopener">Listen to Flowers &amp; Spice EP &rarr;</a>
  </div>

  <nav class="site-nav light" id="site-nav">
    <div class="nav-logo">
      <a href="../"><img src="../images/chinese-seal-logo.png" alt="T. Shan"></a>
    </div>
    <ul class="nav-links">
      <li><a href="../">Home</a></li>
      <li><a href="../press/">Press</a></li>
    </ul>
    <button class="nav-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-nav">
    <a href="../">Home</a>
    <a href="../press/">Press</a>
  </div>

  <div class="page-header">
    <div class="inner">
      <h1 class="section-title">Merch</h1>
    </div>
  </div>

  <div class="press-section">
    <div class="inner">
      <div class="shop-grid">

        <a href="bdsm-embroidered-hoodie/" class="product-card">
          <div class="product-card-images">
            <img class="primary" src="../images/bdsm-hoodie.jpg" alt="'BDSM' embroidered hoodie" loading="lazy">
            <img class="alt" src="../images/bdsm-hoodie-1.jpg" alt="'BDSM' embroidered hoodie" loading="lazy">
          </div>
          <div class="product-card-info">
            <p class="product-card-title">&lsquo;BDSM&rsquo; Embroidered Hoodie</p>
            <p class="product-card-price">$35.00</p>
          </div>
        </a>

        <a href="bdsm-embroidered-beanie/" class="product-card">
          <div class="product-card-images">
            <img class="primary" src="../images/bdsm-beanie-1.jpg" alt="'BDSM' embroidered beanie" loading="lazy">
            <img class="alt" src="../images/bdsm-beanie-2.jpg" alt="'BDSM' embroidered beanie" loading="lazy">
          </div>
          <div class="product-card-info">
            <p class="product-card-title">&lsquo;BDSM&rsquo; Embroidered Beanie</p>
            <p class="product-card-price">$20.00</p>
          </div>
        </a>

      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-logo">
      <img src="../images/chinese-seal-logo.png" alt="T. Shan">
    </div>
    <nav>
      <ul class="footer-nav">
        <li><a href="../">Home</a></li>
        <li><a href="../#about">About</a></li>
        <li><a href="../#music">Music</a></li>
        <li><a href="../press/">Press</a></li>
      </ul>
    </nav>
    <p class="footer-booking">Booking &amp; press: <a href="mailto:contact@tshanmusic.com">contact@tshanmusic.com</a></p>
    <p class="footer-copyright">&copy; <span id="year"></span> T. Shan. All rights reserved.</p>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  <script src="../js/main.js"></script>
</body>
</html>
